version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_PATH: /app/backend/data/requiem.sqlite
      JWT_SECRET: change-this-secret-in-production
    volumes:
      - requiem_data:/app/backend/data
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
volumes:
  requiem_data:
