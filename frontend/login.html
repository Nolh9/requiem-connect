<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Requiem Connect</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="stylesheet" href="css/main.css">
</head>
<body class="auth-page">
<a class="auth-logo" href="index.html">接続 Requiem Connect</a>
<form class="auth-card" id="loginForm">
  <h1>Ha, te revoilà !</h1>
  <p>Connexion directe.</p>
  <label>Email ou nom d'utilisateur</label>
  <input name="emailOrUsername" required>
  <label>Mot de passe</label>
  <input name="password" type="password" required>
  <button class="btn primary full" type="submit">Connexion</button>
  <a href="signup.html" class="small-link">Besoin d’un compte ? S’inscrire</a>
</form>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
